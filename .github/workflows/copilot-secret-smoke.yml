name: "Copilot Secret Smoke"

on:
  workflow_dispatch:
    inputs:
      start_agent_task:
        description: "Start a real Copilot cloud-agent task"
        type: boolean
        default: false
      base_ref:
        description: "Base ref for the optional Copilot task"
        type: string
        default: "main"

permissions:
  contents: read

jobs:
  copilot-secret-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret wiring
        env:
          REACHABLE_COPILOT_USER_TOKEN: ${{ secrets.REACHABLE_COPILOT_USER_TOKEN }}
          COPILOT_MCP_REACHABLE_TOKEN: ${{ secrets.COPILOT_MCP_REACHABLE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${REACHABLE_COPILOT_USER_TOKEN:-}" ]; then
            echo "::error::REACHABLE_COPILOT_USER_TOKEN is not available to this workflow."
            exit 1
          fi
          if [ -z "${COPILOT_MCP_REACHABLE_TOKEN:-}" ]; then
            echo "::error::COPILOT_MCP_REACHABLE_TOKEN is not available to this workflow."
            exit 1
          fi
          echo "Copilot Actions and MCP secret names are available."

      - name: Verify Copilot Agent Tasks API read access
        env:
          REACHABLE_COPILOT_USER_TOKEN: ${{ secrets.REACHABLE_COPILOT_USER_TOKEN }}
        run: |
          set -euo pipefail
          response="$(mktemp)"
          headers="$(mktemp)"
          status="$(curl -sS -D "$headers" -o "$response" -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${REACHABLE_COPILOT_USER_TOKEN}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/agents/repos/${GITHUB_REPOSITORY}/tasks?per_page=1")"
          echo "Agent Tasks list HTTP status: ${status}"
          grep -i '^x-accepted-github-permissions:' "$headers" || true
          if [ "$status" != "200" ]; then
            cat "$response"
            echo "::error::Copilot Agent Tasks read check failed."
            exit 1
          fi
          python3 - "$response" <<'PY'
          import json
          import sys
          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          if not isinstance(payload, dict) or "tasks" not in payload:
              raise SystemExit("Agent Tasks response missing tasks array")
          print(f"Agent Tasks response shape OK; returned {len(payload['tasks'])} task(s).")
          PY

      - name: Start bounded Copilot cloud-agent task
        if: ${{ inputs.start_agent_task }}
        env:
          REACHABLE_COPILOT_USER_TOKEN: ${{ secrets.REACHABLE_COPILOT_USER_TOKEN }}
          BASE_REF: ${{ inputs.base_ref }}
        run: |
          set -euo pipefail
          response="$(mktemp)"
          headers="$(mktemp)"
          payload="$(python3 - <<'PY'
          import json
          import os
          prompt = (
              "REACHABLE Copilot smoke test. Make one minimal documentation-only "
              "change by adding docs/reachable-copilot-smoke.md with a single line "
              f"containing the GitHub Actions run id {os.environ['GITHUB_RUN_ID']}. "
              "Do not modify application code, dependencies, workflows, or security findings. "
              "Open a pull request for review."
          )
          print(json.dumps({
              "prompt": prompt,
              "base_ref": os.environ["BASE_REF"],
              "create_pull_request": True,
          }))
          PY
          )"
          status="$(curl -sS -D "$headers" -o "$response" -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${REACHABLE_COPILOT_USER_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/agents/repos/${GITHUB_REPOSITORY}/tasks" \
            --data "$payload")"
          echo "Agent Tasks start HTTP status: ${status}"
          grep -i '^x-accepted-github-permissions:' "$headers" || true
          cat "$response"
          if [ "$status" != "201" ]; then
            echo "::error::Copilot Agent Task creation failed."
            exit 1
          fi
